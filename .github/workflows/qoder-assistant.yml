name: Qoder Assistant

on:
  issue_comment:
    types: [created]

jobs:
  qoder-assistant:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@qoder') && 
      !github.event.issue.locked
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          fetch-depth: 0

      - name: Set Qoder configuration
        run: |
          mkdir -p ~/.qoder
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > ~/.qoder/config.json
          mkdir -p $GITHUB_WORKSPACE/.qoder
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > $GITHUB_WORKSPACE/.qoder/config.json

      - name: Setup Qoder Config
        run: |
          mkdir -p ~/.qoder
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > ~/.qoder/config.json
          mkdir -p $GITHUB_WORKSPACE/.qoder
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > $GITHUB_WORKSPACE/.qoder/config.json

      - name: Setup Qoder Config
        run: |
          mkdir -p ~/.qoder $GITHUB_WORKSPACE/.qoder
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > ~/.qoder/config.json
          echo '{"models":{"model_name":"claude-3-5-sonnet"}}' > $GITHUB_WORKSPACE/.qoder/config.json

      - name: Run Qoder Assistant
        uses: QoderAI/qoder-action@v0
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          qoder_personal_access_token: ${{ secrets.QODER_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          prompt: |
            /assistant
            ${{ steps.build_args.outputs.args }}
            OUTPUT_LANGUAGE:English
