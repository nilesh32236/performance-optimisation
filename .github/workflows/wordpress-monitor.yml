name: WordPress Feature Monitor

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      create_issues:
        description: 'Create GitHub issues for improvements found'
        type: boolean
        default: true
      force_check:
        description: 'Force check specific WP feature (slug)'
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}

jobs:
  # ── 1. RESEARCH ──────────────────────────────────────────────────────────────
  # Uses raw OpenCode with web search to find new WordPress features/APIs.
  # Raw opencode is needed here — the action's audit mode only reads local
  # code files; web search requires the raw CLI.
  research:
    name: Research WordPress Changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      improvements_found: ${{ steps.search.outputs.improvements_found }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install OpenCode
        run: |
          .github/scripts/setup-opencode.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Research latest WordPress features
        id: search
        run: |
          cat << 'RESEARCH_PROMPT' > /tmp/research-prompt.txt
          RESEARCH OBJECTIVE:
          Search for and document recent WordPress core changes relevant to the Performance Optimisation plugin.

          AREAS TO INVESTIGATE:
          1. Caching API — Any new wp_cache_* functions, cache groups, or cache priming APIs
          2. Object Cache — New backends, wp_cache_supports() additions
          3. Image Processing — New image formats (AVIF improvements), wp_image_* additions
          4. Script/Style API — Loading strategy changes (defer, async, module support)
          5. REST API — New core endpoints, performance improvements
          6. WP Cron — Any scheduling improvements
          7. Filesystem API — New filesystem functions or constants
          8. Performance Hooks — New performance-meta tags, server timing API
          9. Database — Query optimization helpers, $wpdb improvements
          10. Lazy Loading — Core lazy loading expansions
          11. WebP/AVIF — Core image processing improvements
          12. Interactivity API — New WordPress Interactivity API features
          13. HTML API — New WP_HTML_Tag_Processor features
          14. Block Editor — Performance improvements relevant to admin UI

          Use these methods to research:
          1. Web search for "WordPress 6.x performance features new hooks 2026"
          2. Check make.wordpress.org/core for recent performance-related posts
          3. If CONTEXT7_API_KEY is set, query it for latest WordPress developer docs
          4. Check https://developer.wordpress.org/news/ for recent articles

          OUTPUT FORMAT — Write results to /tmp/research-results.md:

          # WordPress Feature Monitor — $(date -u '+%Y-%m-%d')

          ## New Features Discovered
          For each new feature found (or "None found" if nothing new):

          - **Feature Name**: (name)
          - **WordPress Version**: X.Y
          - **Description**: What it does
          - **Relevance to Plugin**: How this relates to our plugin
          - **Priority**: high/medium/low
          - **Implementation Difficulty**: easy/medium/hard

          ## Plugin Code Review

          ### Files checked
          - includes/class-cache.php (caching, CDN, advanced-cache)
          - includes/class-object-cache.php (Redis, WP_Object_Cache drop-in)
          - includes/class-img-converter.php (WebP/AVIF conversion)
          - includes/class-image-optimisation.php (lazy load, picture, preload)
          - includes/class-main.php (hooks, enqueue, minification, preload)
          - includes/class-advanced-cache-handler.php (advanced-cache.php drop-in)
          - includes/class-rest.php (REST API endpoints)
          - src/lazyload.js (frontend lazy loading)

          For each file, note if any WordPress core changes make parts of it obsolete or if there are integration opportunities.

          ## Improvement Opportunities

          For each opportunity (or "None" if nothing actionable):

          - **Title**: (short name)
          - **Current Implementation**: How the plugin does it now
          - **New WordPress Feature**: What WordPress now offers
          - **Recommended Change**: How to update
          - **Fallback Strategy**: How to keep backward compatibility
          - **Risk**: low/medium/high

          ## No-Action Items
          Features checked but determined not relevant.

          ## Summary
          Overall recommendation.
          RESEARCH_PROMPT

          opencode run --auto --model opencode/deepseek-v4-flash-free < /tmp/research-prompt.txt || echo "::warning::OpenCode research exited with code $?"

          if [ -f /tmp/research-results.md ]; then
            cp /tmp/research-results.md /tmp/wp-research.md

            # Count improvements using multiple patterns — OpenCode may format
            # them as numbered sections (### 1. Title), bullet lists, or other styles.
            # NOTE: use '|| true' not '|| echo 0' — grep -c already prints "0" when
            # it finds no matches (and exits 1). '|| echo 0' would add a second "0"
            # making the variable "0\n0" which breaks bash arithmetic.
            COUNT_TITLE=$(grep -cE "^\-\s+\*\*Title\*\*:|^\-\s+\*\*Feature Name\*\*:" /tmp/wp-research.md 2>/dev/null || true)
            COUNT_NUMBERED=$(grep -cE "^###\s+[0-9]+\." /tmp/wp-research.md 2>/dev/null || true)
            COUNT_BULLETS=$(grep -cE "^#{1,3}\s.+(Feature|Improvement|Integration|Opportunity|Enhancement)" /tmp/wp-research.md 2>/dev/null || true)

            # Default to 0 if var is empty (file didn't exist when grep ran)
            COUNT_TITLE=${COUNT_TITLE:-0}
            COUNT_NUMBERED=${COUNT_NUMBERED:-0}
            COUNT_BULLETS=${COUNT_BULLETS:-0}

            # Use the highest count across all patterns
            IMPROVEMENTS=$(( COUNT_TITLE > COUNT_NUMBERED ? COUNT_TITLE : COUNT_NUMBERED ))
            IMPROVEMENTS=$(( IMPROVEMENTS > COUNT_BULLETS ? IMPROVEMENTS : COUNT_BULLETS ))

            # Fallback: if file has substantial content and multiple ## sections,
            # it almost certainly has improvements — treat as at least 1
            FILE_SIZE=$(wc -c < /tmp/wp-research.md)
            HAS_SECTIONS=$(grep -c "^## " /tmp/wp-research.md 2>/dev/null || true)
            HAS_SECTIONS=${HAS_SECTIONS:-0}
            if [ "$IMPROVEMENTS" -eq 0 ] && [ "$FILE_SIZE" -gt 500 ] && [ "$HAS_SECTIONS" -gt 1 ]; then
              IMPROVEMENTS=1
              echo "::notice::Pattern match returned 0 but file has ${FILE_SIZE} bytes and ${HAS_SECTIONS} sections — treating as 1 improvement"
            fi

            echo "improvements_found=${IMPROVEMENTS}" >> "$GITHUB_OUTPUT"
            echo "Research complete. ${IMPROVEMENTS} improvement opportunities found (title=${COUNT_TITLE}, numbered=${COUNT_NUMBERED}, bullets=${COUNT_BULLETS})."
          else
            echo "No research results file found. Creating placeholder..."
            {
            echo "# WordPress Feature Monitor — $(date -u '+%Y-%m-%d')"
            echo ""
            echo "## New Features Discovered"
            echo "No significant new features found in this cycle."
            echo ""
            echo "## Summary"
            echo "Weekly WordPress feature check complete — no actionable improvements identified."
            } > /tmp/wp-research.md
            echo "improvements_found=0" >> "$GITHUB_OUTPUT"
          fi


      - name: Upload research report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-research-report
          path: /tmp/wp-research.md
          retention-days: 30

  # ── 2. CREATE ISSUES ─────────────────────────────────────────────────────────
  # Uses the opencode-ai-reviewer action in audit mode with the research
  # findings as context. The action cross-references findings with actual plugin
  # code and creates individual GitHub issues — one per actionable improvement.
  # Each issue is labeled with 'wp-monitor' + 'autofix-trigger' so that
  # wppo-ai-review.yml fix-issue fires automatically per issue.
  create-issues:
    name: Create Improvement Issues
    needs: [research]
    if: needs.research.outputs.improvements_found > 0 && github.event.inputs.create_issues != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Download research report
        uses: actions/download-artifact@v4
        with:
          name: wp-research-report
          path: /tmp/

      - name: Ensure wp-monitor label exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh label create "wp-monitor"       --force --color "0075ca" --description "WordPress feature monitor improvement" -R "${{ github.repository }}" 2>/dev/null || true
          gh label create "autofix-trigger"  --force --color "c2e0c6" --description "Triggers autofix workflow on issues"  -R "${{ github.repository }}" 2>/dev/null || true

      - name: Write research as audit prompt
        run: |
          # Build a targeted audit prompt that tells the action what WP features
          # were found and asks it to create issues for implementing each one.
          mkdir -p .audit-prompts
          cat > .audit-prompts/wp-monitor-session.md << 'PROMPT_HEADER'
          # WordPress Feature Monitor — Implementation Audit

          You are auditing the WordPress Performance Optimisation plugin code.
          The research below identified new WordPress core features that this plugin
          could adopt. Your job is to review the actual plugin files and create
          individual GitHub issues for each actionable improvement.

          ## Rules
          - Only create issues for changes that are backward-compatible with WordPress 6.2+
          - Every new WP function call MUST be guarded with function_exists() or version_compare()
          - Skip anything that would break existing functionality or the settings schema
          - "low risk" means the change is isolated to a single function/method
          - Prefer easy/medium difficulty improvements — skip hard ones that risk instability
          - Each issue should describe ONE specific change with a clear file + function target

          ## Research Findings
          PROMPT_HEADER

          cat /tmp/wp-research.md >> .audit-prompts/wp-monitor-session.md

          cat >> .audit-prompts/wp-monitor-session.md << 'PROMPT_FOOTER'

          ## Plugin Architecture Reference
          - PHP classes in includes/ (manually required, no PSR-4)
          - React SPA in src/ (built with @wordpress/scripts, wppoSettings global)
          - Settings stored in wppo_settings option (serialized array)
          - All REST endpoints in includes/class-rest.php (manage_options + X-WP-Nonce)
          - Image conversion: includes/class-img-converter.php (GD + Imagick)
          - Cache: includes/class-cache.php (HTML cache) + includes/class-object-cache.php (Redis)

          When you find an improvement in the research that applies to a specific file,
          create an issue titled: [WP Monitor] <short description>
          Include: which file to change, what function/hook to add, and the fallback pattern.
          PROMPT_FOOTER

      - name: Create improvement issues via AI audit
        id: audit
        uses: nilesh32236/opencode-ai-reviewer@latest
        with:
          mode: audit
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          model: 'opencode/deepseek-v4-flash-free'
          # Custom prompt from research findings — overrides the default audit prompt
          audit_prompt_file: '.audit-prompts/wp-monitor-session.md'
          audit_target_dirs: 'includes,src'
          audit_create_issues: true
          # Label each created issue with autofix-trigger so wppo-ai-review.yml
          # fix-issue job fires automatically for each improvement
          audit_auto_fix: true
          audit_labels: 'wp-monitor,autofix-trigger'
          enable_mcp: false
          project_context: >
            WordPress Performance Optimisation Plugin — PHP 8.2+, WP 6.2+.
            PHP follows WordPress Coding Standards (phpcs.xml). JS is React with @wordpress/scripts.
            Always use function_exists() and version_compare() for new WordPress API calls.
            Minimum WordPress version: 6.2. Only create issues for backward-compatible improvements.
            Verification commands: npm run lint:js, composer lint, npm test, npm run build.

  # ── 3. SUMMARY ───────────────────────────────────────────────────────────────
  summary:
    name: Summary Report
    needs: [research, create-issues]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download research report
        uses: actions/download-artifact@v4
        with:
          name: wp-research-report
          path: /tmp/
        continue-on-error: true

      - name: Post summary
        run: |
          {
            echo "# WordPress Feature Monitor — $(date -u '+%Y-%m-%d')"
            echo ""
            echo "## Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Improvement opportunities found | ${{ needs.research.outputs.improvements_found }} |"
            echo "| Issues created | ${{ needs.create-issues.result == 'success' && '✅' || needs.create-issues.result == 'skipped' && '⏭️ (0 improvements found)' || '❌' }} |"
            echo ""
            echo "Issues labeled \`wp-monitor\` + \`autofix-trigger\` are queued for the AI fix loop."
            echo "The \`wppo-ai-review.yml\` \`fix-issue\` job will handle each one automatically."
            echo ""
            if [ -f /tmp/wp-research.md ]; then
              echo "<details>"
              echo "<summary>Research Report</summary>"
              echo ""
              cat /tmp/wp-research.md
              echo ""
              echo "</details>"
            fi
          } >> $GITHUB_STEP_SUMMARY
