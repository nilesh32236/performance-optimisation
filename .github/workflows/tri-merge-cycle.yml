name: Tri-Weekly Merge & Release Cycle

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Skip release tag creation'
        type: boolean
        default: false
      force_version:
        description: 'Force a specific version (e.g., 1.7.0)'
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

env:
  CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}

jobs:
  verify:
    name: Full Verification Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      status: ${{ steps.run-checks.outputs.status }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --ignore-platform-reqs
          npm ci || npm install

      - name: Run verification suite
        id: run-checks
        run: |
          FAILED=0
          echo "::group::JS Lint"
          npm run lint:js 2>&1 || { echo "JS_LINT=failed" >> $GITHUB_ENV; FAILED=1; }
          echo "::endgroup::"
          echo "::group::PHP Lint"
          composer lint 2>&1 || { echo "PHP_LINT=failed" >> $GITHUB_ENV; FAILED=1; }
          echo "::endgroup::"
          echo "::group::JS Tests"
          npm test 2>&1 || { echo "JS_TESTS=failed" >> $GITHUB_ENV; FAILED=1; }
          echo "::endgroup::"
          echo "::group::Build"
          npm run build 2>&1 || { echo "BUILD=failed" >> $GITHUB_ENV; FAILED=1; }
          echo "::endgroup::"
          if [ "$FAILED" = "1" ]; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "status=passed" >> "$GITHUB_OUTPUT"

  resolve-conflicts:
    name: Resolve Merge Conflicts
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      ready_prs: ${{ steps.resolve.outputs.ready_prs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer install --ignore-platform-reqs
          npm ci || npm install

      - name: Setup OpenCode
        run: |
          .github/scripts/setup-opencode.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: List and process open PRs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --repo "${{ github.repository }}" --state open --json number,title,headRefName,baseRefName,mergeable,reviews,statusCheckRollup > /tmp/all-prs.json

          READY_PRS=""
          while read -r PR; do
            PR_NUM=$(echo "$PR" | jq -r '.number')
            PR_HEAD=$(echo "$PR" | jq -r '.headRefName')
            PR_BASE=$(echo "$PR" | jq -r '.baseRefName')
            MERGEABLE=$(echo "$PR" | jq -r '.mergeable')

            echo "::group::Processing PR #${PR_NUM} (${PR_HEAD} -> ${PR_BASE})"

            CHECKS_FAILED=$(echo "$PR" | jq '[.statusCheckRollup[] | select(.conclusion == "FAILURE" or .conclusion == "CANCELLED" or .conclusion == "ERROR" or .conclusion == "STARTUP_FAILURE" or .conclusion == "STALE")] | length')
            CHECKS_PENDING=$(echo "$PR" | jq '[.statusCheckRollup[] | select(.status != "COMPLETED")] | length')

            if [ "$CHECKS_FAILED" -gt 0 ]; then
              echo "Skipping PR #${PR_NUM}: ${CHECKS_FAILED} check(s) failed"
              echo "::endgroup::"
              continue
            fi

            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "Resolving merge conflicts on PR #${PR_NUM}..."

              git remote add origin-temp "https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
              git fetch origin-temp

              git checkout -b "${PR_HEAD}-resolve" "origin-temp/${PR_HEAD}"

              if git rebase "origin-temp/${PR_BASE}"; then
                echo "Rebase succeeded without conflicts"
                git push origin-temp "${PR_HEAD}-resolve:${PR_HEAD}" --force-with-lease
              else
                echo "Rebase has conflicts. Resolving with AI..."
                CONFLICT_FILES=$(git diff --name-only --diff-filter=U)

                for CFILE in $CONFLICT_FILES; do
                  cat << PROMPT > /tmp/conflict-prompt.txt
                  Resolve the merge conflict in file ${CFILE} for the Performance Optimisation WordPress plugin.

                  The file has merge conflict markers. Analyze both sides and produce a clean merge.
                  Follow these rules:
                  1. Keep both changes if they don't conflict logically
                  2. If one side is a version bump or trivial, prefer the incoming change
                  3. Ensure PHP/JS syntax is valid after resolution
                  4. Maintain WordPress Coding Standards
                  5. Keep backward compatibility

                  Write the resolved file content to /tmp/resolved-${CFILE//\//_}.txt
                  PROMPT

                  CONTENT=$(cat "$CFILE")
                  NEWLINE=$'\n'
                  opencode run --auto --model opencode/deepseek-v4-flash-free \
                    "Here is the conflicted file content:${NEWLINE}${NEWLINE}\`\`\`${NEWLINE}${CONTENT}${NEWLINE}\`\`\`${NEWLINE}${NEWLINE}$(cat /tmp/conflict-prompt.txt)" < /dev/null || echo "::warning::OpenCode conflict resolution exited with code $?"

                  if [ -f "/tmp/resolved-${CFILE//\//_}.txt" ]; then
                    cp "/tmp/resolved-${CFILE//\//_}.txt" "$CFILE"
                    git add "$CFILE"
                  fi
                done

                if git rebase --continue 2>/dev/null; then
                  echo "Rebase completed after conflict resolution"
                  git push origin-temp "${PR_HEAD}-resolve:${PR_HEAD}" --force-with-lease
                else
                  echo "::warning::Could not resolve all conflicts in PR #${PR_NUM}. Aborting rebase."
                  git rebase --abort 2>/dev/null || true
                fi
              fi

              git remote remove origin-temp
              echo "Conflicts resolved for PR #${PR_NUM}"
            fi

            TOTAL_CHECKS=$(echo "$PR" | jq '.statusCheckRollup | length')

            if [ "$CHECKS_PENDING" -eq 0 ] && [ "$CHECKS_FAILED" -eq 0 ] && [ "$TOTAL_CHECKS" -gt 0 ]; then
              READY_PRS="${READY_PRS}${PR_NUM} "
            elif [ "$TOTAL_CHECKS" -eq 0 ]; then
              echo "PR #${PR_NUM}: No CI checks (may be draft PR)"
            fi

            echo "::endgroup::"
          done < <(jq -c '.[]' /tmp/all-prs.json)

          READY_PRS="${READY_PRS% }"
          echo "ready_prs=${READY_PRS}" >> "$GITHUB_OUTPUT"

  merge-all:
    name: Merge Ready PRs
    needs: [verify, resolve-conflicts]
    if: needs.resolve-conflicts.outputs.ready_prs != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Merge all ready PRs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          for PR_NUM in ${{ needs.resolve-conflicts.outputs.ready_prs }}; do
            echo "Merging PR #${PR_NUM}..."
            if gh pr merge "$PR_NUM" --repo "${{ github.repository }}" --squash --delete-branch 2>/dev/null; then
              echo "PR #${PR_NUM} merged successfully"
              gh pr edit "$PR_NUM" --repo "${{ github.repository }}" --add-label "auto-merged" 2>/dev/null || true
            else
              echo "::warning::Failed to merge PR #${PR_NUM}"
            fi
          done

  release:
    name: Version & Release Tag
    needs: [verify, resolve-conflicts]
    if: success() && github.event.inputs.skip_release != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor || 'performance-optimisation[bot]' }}"
          git config --global user.email "${{ github.actor || 'performance-optimisation[bot]' }}@users.noreply.github.com"

      - name: Check latest release
        id: release-check
        run: |
          .github/scripts/check-latest-release.sh "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Build release assets
        id: build-release
        if: steps.release-check.outputs.needs_release == 'true'
        run: |
          NEXT_VERSION="${{ github.event.inputs.force_version || steps.release-check.outputs.next_version }}"
          echo "next_version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

          CURRENT_VERSION="${{ steps.release-check.outputs.current_version }}"
          if [ "${CURRENT_VERSION}" != "${NEXT_VERSION}" ]; then
            echo "Updating version from ${CURRENT_VERSION} to ${NEXT_VERSION}"
            sed -i "s/^Version:.*/Version: ${NEXT_VERSION}/" performance-optimisation.php
            sed -i "s/define( 'WPPO_VERSION', '[^']*' );/define( 'WPPO_VERSION', '${NEXT_VERSION}' );/" performance-optimisation.php
            ESCAPED_CURRENT=$(printf '%s\n' "${CURRENT_VERSION}" | sed 's/\./\\./g')
            sed -i "s/\"version\": \"${ESCAPED_CURRENT}\"/\"version\": \"${NEXT_VERSION}\"/" package.json
            git add performance-optimisation.php package.json
            git commit -m "chore: bump version to ${NEXT_VERSION}" || true
          fi

          composer install --no-dev --optimize-autoloader --ignore-platform-reqs

          npm ci || npm install
          npm run build

          git add vendor/ build/ -A 2>/dev/null || true
          git commit -m "chore: prepare release ${NEXT_VERSION}" || true

      - name: Create release tag
        if: steps.release-check.outputs.needs_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          NEXT_VERSION="${{ steps.build-release.outputs.next_version }}"
          TAG_NAME="v${NEXT_VERSION}"

          git push origin HEAD:master 2>/dev/null || {
            echo "::warning::Push to master failed. Trying force-with-lease..."
            git push origin HEAD:master --force-with-lease 2>/dev/null || {
              echo "::error::Could not push to master. Aborting release."
              exit 1
            }
          }

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists. Deleting and recreating..."
            git tag -d "${TAG_NAME}"
            git push origin ":refs/tags/${TAG_NAME}" 2>/dev/null || true
          fi

          git tag "${TAG_NAME}" -m "Release ${TAG_NAME}"
          git push origin "${TAG_NAME}"

          echo "Release tag ${TAG_NAME} created and pushed."
          echo "This will trigger the release.yml workflow to build and deploy to WordPress.org."

      - name: Create release summary
        if: always()
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Tri-Weekly Merge & Release Cycle

          **Status:** ${{ steps.release-check.outputs.needs_release == 'true' && '✅ Release created' || '⏭️ No release needed' }}

          | Detail | Value |
          |--------|-------|
          | Current version | ${{ steps.release-check.outputs.current_version }} |
          | Latest release | ${{ steps.release-check.outputs.latest_release_tag }} |
          | Next version | ${{ steps.build-release.outputs.next_version || steps.release-check.outputs.next_version }} |
          | Verification | ${{ needs.verify.outputs.status }} |

          ${{ steps.release-check.outputs.needs_release == 'true' && format('Release tag **v{0}** pushed. The [release workflow]({1}/{2}/actions/workflows/release.yml) will deploy to WordPress.org.', steps.build-release.outputs.next_version || steps.release-check.outputs.next_version, github.server_url, github.repository) || '' }}
          EOF
