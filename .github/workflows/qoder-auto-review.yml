name: Qoder Auto Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  qoder-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Qoder Config
        run: |
          mkdir -p ~/.qoder $GITHUB_WORKSPACE/.qoder
          echo '{"models":{"default":{"model_name":"claude-3-5-sonnet"}}}' > ~/.qoder/config.json
          echo '{"models":{"default":{"model_name":"claude-3-5-sonnet"}}}' > $GITHUB_WORKSPACE/.qoder/config.json
          cat ~/.qoder/config.json

      - name: Run Qoder Code Review
        uses: QoderAI/qoder-action@v0
        continue-on-error: true
        env:
          QODER_CONFIG_DIR: /home/runner/.qoder
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            /review-pr
            REPO:${{ github.repository }} PR_NUMBER:${{ github.event.pull_request.number }}
            OUTPUT_LANGUAGE:English
