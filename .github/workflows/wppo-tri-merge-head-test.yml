name: Tri-Weekly Merge and Release Cycle

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Skip release tag creation'
        type: boolean
        default: false
      force_version:
        description: 'Force a specific version (e.g., 1.7.0)'
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

env:
  CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}

jobs:
  verify:
    name: Full Verification Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "OK"
