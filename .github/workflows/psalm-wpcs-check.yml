name: Psalm and WPCS Checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '28 13 * * 0'

permissions:
  contents: write
  issues: write
  security-events: write

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: parallel-lint

      - name: PHP Syntax Check
        run: parallel-lint --exclude vendor --exclude node_modules .

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@6

      - name: Run WPCS check
        id: wpcs_check
        run: |
          # Run phpcs and generate checkstyle report
          vendor/bin/phpcs . --standard=WordPress --extensions=php --ignore="vendor/*,node_modules/*,index.asset.php" --report=checkstyle --report-file=reports/wpcs.xml || true
          # Also run standard output for the logs
          vendor/bin/phpcs . --standard=WordPress --extensions=php --ignore="vendor/*,node_modules/*,index.asset.php"
        continue-on-error: true

      - name: Psalm Security Scan
        id: psalm
        uses: docker://ghcr.io/psalm/psalm-security-scan
        with:
          report_file: reports/psalm.sarif
        continue-on-error: true

      - name: Upload Security Analysis results
        if: always() && steps.psalm.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/psalm.sarif

      - name: Fix Reports Permissions
        if: always()
        run: sudo chown -R runner:docker reports

      # This step generates a standard report for Issue management if needed
      - name: Generate Reports
        if: always()
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os

          table = "| Tool | File | Line | Message |\n| --- | --- | --- | --- |\n"
          has_errors = False

          # WPCS
          wpcs_file = 'reports/wpcs.xml'
          if os.path.exists(wpcs_file):
              try:
                  root = ET.parse(wpcs_file).getroot()
                  for file_node in root.findall('file'):
                      filename = file_node.get('name').split('/')[-1] # Simplify name
                      for error in file_node.findall('error'):
                          has_errors = True
                          msg = error.get('message').replace('|', '\\|')
                          table += f"| WPCS | {filename} | {error.get('line')} | {msg} |\n"
              except Exception as e:
                  table += f"| WPCS | Error | - | Failed to parse report: {str(e)} |\n"

          # Psalm
          psalm_file = 'reports/psalm.sarif'
          if os.path.exists(psalm_file):
              try:
                  with open(psalm_file) as f:
                      data = json.load(f)
                      for run in data.get('runs', []):
                          for result in run.get('results', []):
                              has_errors = True
                              msg = result.get('message', {}).get('text', '').replace('|', '\\|')
                              for loc in result.get('locations', []):
                                  phys = loc.get('physicalLocation', {})
                                  filename = phys.get('artifactLocation', {}).get('uri', '').split('/')[-1]
                                  line = phys.get('region', {}).get('startLine', '?')
                                  table += f"| Psalm | {filename} | {line} | {msg} |\n"
              except Exception as e:
                  table += f"| Psalm | Error | - | Failed to parse report: {str(e)} |\n"

          if not has_errors:
              table = "All checks passed! 🎉"

          with open('reports/summary.md', 'w') as f:
              f.write(table)
          
          # Write status for shell script
          with open('reports/status.txt', 'w') as f:
              f.write("failure" if has_errors else "success")

      - name: Manage GitHub Issue
        id: manage_issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          STATUS=$(cat reports/status.txt 2>/dev/null || echo "failure")

          if [[ "$STATUS" == "success" ]]; then
            EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')
            if [[ -n "$EXISTING_ISSUE" ]]; then
              gh issue close "$EXISTING_ISSUE" --comment "Code quality issues fixed in $BRANCH."
            fi
            exit 0
          fi
          
          # Create or Update issue
          SUMMARY=$(cat reports/summary.md)
          BODY="### Code Quality Issues Detected in $BRANCH
          
          $SUMMARY
          
          Please check the [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          
          EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')
          
          if [[ -n "$EXISTING_ISSUE" ]]; then
            gh issue edit "$EXISTING_ISSUE" --body "$BODY"
          else
            gh issue create --title "Code Quality Issues Found in $BRANCH" --body "$BODY" --label "bug,code-quality" --assignee "${{ github.actor }}"
          fi
