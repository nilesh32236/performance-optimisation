name: Psalm and WPCS Checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '28 13 * * 0'

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: parallel-lint

      - name: PHP Syntax Check
        run: parallel-lint --exclude vendor .

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --optimize-autoloader

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run WPCS check
        id: wpcs_check
        run: |
          vendor/bin/phpcs . --standard=WordPress --extensions=php --ignore="vendor/*" --report=checkstyle --report-file=reports/wpcs.xml || true
          vendor/bin/phpcs . --standard=WordPress --extensions=php --ignore="vendor/*"
        continue-on-error: true

      - name: Psalm Security Scan
        id: psalm
        uses: docker://ghcr.io/psalm/psalm-security-scan
        with:
          report_file: reports/psalm.sarif
        continue-on-error: true

      - name: Check psalm report exists
        id: psalm_report
        if: always()
        run: echo "exists=$(test -f reports/psalm.sarif && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Upload Security Analysis results
        if: always() && steps.psalm.outcome != 'skipped' && steps.psalm_report.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/psalm.sarif

      - name: Fix Reports Permissions
        if: always()
        run: sudo chown -R runner:docker reports

      - name: Generate Reports
        if: always()
        shell: python
        run: |
          import xml.etree.ElementTree as ET
          import json
          import os

          table = "| Tool | File | Line | Message |\n| --- | --- | --- | --- |\n"
          has_errors = False

          # WPCS
          wpcs_file = 'reports/wpcs.xml'
          if os.path.exists(wpcs_file):
              try:
                  root = ET.parse(wpcs_file).getroot()
                  for file_node in root.findall('file'):
                      full_path = file_node.get('name')
                      rel_path = os.path.relpath(full_path, start=os.getcwd()) if os.path.isabs(full_path) else full_path
                      filename = rel_path.split('/')[-1]
                      for error in file_node.findall('error'):
                          has_errors = True
                          line = error.get('line')
                          col = error.get('column', '1')
                          raw_msg = error.get('message', '')
                          msg = raw_msg.replace('|', '\\|')
                          table += f"| WPCS | {filename} | {line} | {msg} |\n"
                          
                          # Add GitHub workflow annotation (Shows as PR Review Comment)
                          clean_msg = raw_msg.replace('\n', '%0A').replace('\r', '')
                          print(f"::error file={rel_path},line={line},col={col}::WPCS: {clean_msg}")
              except Exception as e:
                  table += f"| WPCS | Error | - | Failed to parse report: {str(e)} |\n"

          # Psalm
          psalm_file = 'reports/psalm.sarif'
          if os.path.exists(psalm_file):
              try:
                  with open(psalm_file) as f:
                      data = json.load(f)
                      for run in data.get('runs', []):
                          for result in run.get('results', []):
                              has_errors = True
                              raw_msg = result.get('message', {}).get('text', '')
                              msg = raw_msg.replace('|', '\\|')
                              for loc in result.get('locations', []):
                                  phys = loc.get('physicalLocation', {})
                                  rel_path = phys.get('artifactLocation', {}).get('uri', '')
                                  if rel_path.startswith('file://'):
                                      rel_path = rel_path[7:]
                                  rel_path = os.path.relpath(rel_path, start=os.getcwd()) if os.path.isabs(rel_path) else rel_path
                                  filename = rel_path.split('/')[-1]
                                  line = phys.get('region', {}).get('startLine', '?')
                                  table += f"| Psalm | {filename} | {line} | {msg} |\n"
                                  
                                  # Add GitHub workflow annotation (Shows as PR Review Comment)
                                  clean_msg = raw_msg.replace('\n', '%0A').replace('\r', '')
                                  print(f"::error file={rel_path},line={line}::Psalm: {clean_msg}")
              except Exception as e:
                  table += f"| Psalm | Error | - | Failed to parse report: {str(e)} |\n"

          if not has_errors:
              table = "All checks passed! 🎉"

          with open('reports/summary.md', 'w') as f:
              f.write(table)

          with open('reports/status.txt', 'w') as f:
              f.write("failure" if has_errors else "success")

      - name: Manage GitHub PR Comment or Issue
        id: manage_issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          STATUS=$(cat reports/status.txt 2>/dev/null || echo "failure")
          EVENT_NAME="${{ github.event_name }}"

          if [[ "$STATUS" == "success" ]]; then
            BODY="### Code Quality Issues Detected in $BRANCH
            
            ✅ All code quality checks passed! 🎉"
          else
            SUMMARY=$(cat reports/summary.md)
            BODY="### Code Quality Issues Detected in $BRANCH

            $SUMMARY

            Please check the [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

          if [[ "$BRANCH" == "main" && "$EVENT_NAME" != "pull_request" ]]; then
            if [[ "$STATUS" == "success" ]]; then
              EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')
              if [[ -n "$EXISTING_ISSUE" ]]; then
                gh issue close "$EXISTING_ISSUE" --comment "Code quality issues fixed in $BRANCH."
              fi
              exit 0
            fi

            EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')

            if [[ -n "$EXISTING_ISSUE" ]]; then
              gh issue edit "$EXISTING_ISSUE" --body "$BODY"
            else
              gh issue create --title "Code Quality Issues Found in $BRANCH" --body "$BODY" --label "bug,code-quality" --assignee "${{ github.actor }}"
            fi
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            # Find existing comment from this action
            COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" -q '.[] | select(.body | startswith("### Code Quality Issues Detected in")) | .id' | head -n 1)
            
            if [[ -n "$COMMENT_ID" ]]; then
              gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -f body="$BODY"
            else
              gh pr comment "$PR_NUMBER" --body "$BODY"
            fi
            exit 0
          fi
