name: Psalm and WPCS Checks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '28 13 * * 0'

permissions:
  contents: write
  issues: write
  security-events: write

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: php-parallel-lint

      - name: PHP Syntax Check
        run: php-parallel-lint --exclude vendor --exclude node_modules .

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcs, composer:v2

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run WPCS check
        id: wpcs_check
        uses: 10up/wpcs-action@stable
        with:
          enable_warnings: true
          paths: '.'
          excludes: 'index.asset.php,vendor/*,node_modules/*'
          standard: 'WordPress'
          phpcs_bin_path: 'phpcs'
          use_local_config: false
        continue-on-error: true

      - name: Psalm Security Scan
        id: psalm
        uses: psalm/psalm-github-security-scan@v1
        continue-on-error: true

      # This step generates a standard report for Issue management if needed
      - name: Generate Reports
        if: always()
        run: |
          mkdir -p reports
          # We'll use the outcomes to decide if we need to post an issue
          echo "WPCS Outcome: ${{ steps.wpcs_check.outcome }}" > reports/status.txt
          echo "Psalm Outcome: ${{ steps.psalm.outcome }}" >> reports/status.txt

      - name: Manage GitHub Issue
        id: manage_issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Simplified issue management logic
          BRANCH="${{ github.ref_name }}"
          STATUS_FILE="reports/status.txt"
          
          if [[ "${{ steps.wpcs_check.outcome }}" == "success" && "${{ steps.psalm.outcome }}" == "success" ]]; then
            # Close existing issue if everything is fixed
            EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')
            if [[ -n "$EXISTING_ISSUE" ]]; then
              gh issue close "$EXISTING_ISSUE" --comment "Code quality issues fixed in $BRANCH."
            fi
            exit 0
          fi
          
          # Create or Update issue
          BODY="### Code Quality Issues Detected in $BRANCH
          - WPCS: ${{ steps.wpcs_check.outcome }}
          - Psalm: ${{ steps.psalm.outcome }}
          
          Please check the [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          
          EXISTING_ISSUE=$(gh issue list --label "code-quality" --search "in $BRANCH" --json number --jq '.[0].number')
          
          if [[ -n "$EXISTING_ISSUE" ]]; then
            gh issue edit "$EXISTING_ISSUE" --body "$BODY"
          else
            gh issue create --title "Code Quality Issues Found in $BRANCH" --body "$BODY" --label "bug,code-quality" --assignee "${{ github.actor }}"
          fi
